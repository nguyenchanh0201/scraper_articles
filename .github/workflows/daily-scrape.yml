name: Daily Scrape

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Scrape and upload delta
        run: python main.py
        env:
          API_KEY: ${{ secrets.API_KEY }}

      - name: Commit scraped article changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraped_articles
          git diff --cached --quiet || git commit -m "Update scraped articles"
          git push
